# ==========================================
# .gitlab-ci.yml - CI/CD Pipeline
# DevSecOps private laboratory pipeline
# ==========================================

image: node:20-alpine

stages:
  - lint
  - test
  - security
  - build

cache:
  paths:
    - node_modules/
    - .next/cache/

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

install_dependencies:
  stage: .pre
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

linting:
  stage: lint
  script:
    - npm run lint

testing:
  stage: test
  script:
    - echo "Running testing suite..."
    - npx vitest run --passWithNoTests

security_scan:
  stage: security
  image: returntocorp/semgrep
  script:
    - semgrep scan --config auto
  allow_failure: true

build_app:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 2 days
