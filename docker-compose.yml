version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres
    volumes:
      - ./.env:/app/.env.local

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: modern_esthete
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run/postgresql
      - /tmp

volumes:
  postgres_data:
